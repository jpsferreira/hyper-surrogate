[tox]
skipsdist = true
envlist = py312, py313

[gh-actions]
python =
    3.12: py312
    3.13: py313

[testenv]
passenv = PYTHON_VERSION
allowlist_externals = poetry
commands =
    poetry install -v --extras ml
    pytest --doctest-modules tests -m "" --cov --cov-config=pyproject.toml --cov-report=xml
    mypy
